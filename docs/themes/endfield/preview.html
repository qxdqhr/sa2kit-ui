<!DOCTYPE html>
<html lang="zh-CN" data-theme="endfield">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>终末地主题预览 · SA2Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ef-yellow-500: #ffd000;
      --ef-yellow-600: #e6bc00;
      --ef-gray-950: #1a1a1e;
      --ef-gray-600: #5c5c66;
      --ef-gray-100: #e8e8ec;
      --ef-white: #f4f4f6;
      --ef-cyan-500: #00d4e8;
      --ef-magenta-500: #e840a0;
      --ef-radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      color: var(--ef-gray-950);
      background:
        linear-gradient(rgba(26,26,30,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,26,30,.04) 1px, transparent 1px),
        var(--ef-gray-100);
      background-size: 20px 20px;
      min-height: 100vh;
    }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; border-bottom: 1px solid rgba(26,26,30,.14);
      background: rgba(244,244,246,.9); backdrop-filter: blur(8px);
    }
    .nav h1 { font-size: 1rem; letter-spacing: .12em; text-transform: uppercase; }
    .hero { max-width: 960px; margin: 3rem auto; padding: 0 1.5rem; }
    .hero .eyebrow {
      font-family: 'JetBrains Mono', monospace; font-size: .75rem;
      color: var(--ef-yellow-600); letter-spacing: .2em; margin-bottom: .75rem;
    }
    .hero h2 { font-size: 2.5rem; font-weight: 700; margin-bottom: .5rem; }
    .hero p { color: var(--ef-gray-600); max-width: 36rem; line-height: 1.7; }
    .cmyk { height: 4px; margin: 2rem 0; background: linear-gradient(90deg, var(--ef-cyan-500) 25%, var(--ef-magenta-500) 25% 50%, var(--ef-yellow-500) 50% 75%, var(--ef-gray-950) 75%); }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; max-width: 960px; margin: 0 auto 3rem; padding: 0 1.5rem; }
    .card {
      background: var(--ef-white); border: 1px solid rgba(26,26,30,.18);
      border-radius: var(--ef-radius); padding: 1.25rem;
      border-left: 3px solid var(--ef-yellow-500);
    }
    .card h3 { font-size: .9rem; margin-bottom: .35rem; }
    .card span { font-size: .8rem; color: var(--ef-gray-600); }
    .btn {
      display: inline-block; margin-top: 1.5rem; padding: .65rem 1.4rem;
      background: linear-gradient(135deg, #ffd000, #e6bc00);
      color: var(--ef-gray-950); font-weight: 700; border: 1px solid #9a7a00;
      border-radius: var(--ef-radius); text-decoration: none; letter-spacing: .06em;
    }
    .tags { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem; }
    .tag { font-size: .7rem; font-weight: 700; padding: .25rem .55rem; border-radius: 4px; }
    .tag--y { background: rgba(255,208,0,.3); }
    .tag--c { background: rgba(0,212,232,.2); color: #009aab; }
    .tag--m { background: rgba(232,64,160,.18); color: #b8307a; }
  </style>
</head>
<body>
  <nav class="nav"><h1>Endfield · 终末地</h1><span>SA2Kit Theme Preview</span></nav>
  <section class="hero">
    <p class="eyebrow">ADMIN TERMINAL</p>
    <h2>工业机能 · 明黄警示</h2>
    <p>黑白灰冷底 + 警戒黄高亮，延续明日方舟工业 HUD 气质。CMYK 色带、网格底纹、扁平控制面板。</p>
    <div class="cmyk"></div>
    <a class="btn" href="#">接入终端</a>
    <div class="tags">
      <span class="tag tag--y">任务</span>
      <span class="tag tag--c">数据</span>
      <span class="tag tag--m">警示</span>
    </div>
  </section>
  <div class="grid">
    <div class="card"><h3>配色</h3><span>#FFD000 / #1A1A1E / #E8E8EC</span></div>
    <div class="card"><h3>形状</h3><span>小圆角 4–8px · 扁平投影</span></div>
    <div class="card"><h3>装饰</h3><span>CMYK 色带 · CAD 网格</span></div>
  </div>
</body>
</html>
